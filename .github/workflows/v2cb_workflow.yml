name: V2CB Auto Algo

on:
  schedule:
    # Every 5 minutes, 9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC, Mon-Fri
    - cron: '45,50,55 3 * * 1-5'
    - cron: '*/5 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch: {}   # lets you manually trigger a test run from GitHub

permissions:
  contents: write

jobs:
  run-algo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz growwapi pyotp

      - name: Run algo
        env:
          GROWW_TOTP_API_KEY: ${{ secrets.GROWW_TOTP_API_KEY }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 v2cb_algo_master.py

      - name: Commit updated state
        run: |
          git config user.name "v2cb-algo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update state [skip ci]"
          git pull --rebase origin main
          git push

